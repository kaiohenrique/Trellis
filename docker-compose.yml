services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kb-postgres
    environment:
      POSTGRES_USER: kb
      POSTGRES_PASSWORD: kb
      POSTGRES_DB: kb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb -d kb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
