name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck server
        run: npx tsc -p server/tsconfig.json --noEmit

      - name: Typecheck client
        run: npx tsc -p client/tsconfig.json --noEmit

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    # Integration tests need a real Postgres; they self-skip without KB_DATABASE_URL.
    # Unit tests for the wiki helpers and the query helper run without one.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run server tests
        run: npm test -w server

  client-build:
    name: Client build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build client (vite)
        run: npm run build -w client

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7
